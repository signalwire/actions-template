name: Dasel
description: short for data-selector

runs:
  using: "composite"
  steps:

    - uses: actions/cache@v5
      name: Restore cache
      id: cache
      with:
        path: ./dasel
        key: ${{ runner.os }}-dasel-v2.8.1
        restore-keys: |
          ${{ runner.os }}-dasel-v2.8.1

    - name: Install Dasel
      if: steps.cache.outputs.cache-hit != 'true'
      run: curl -sSLf https://github.com/TomWright/dasel/releases/download/v2.8.1/dasel_linux_amd64 -L -o dasel && chmod +x dasel
      shell: bash

    # Leave it static for now
    - name: Run validation
      run: |
        mkdir -p toml/labeled_configs
        mv labeled_base.conf ./toml/labeled_base.toml
        for file in labeled_configs/*.conf; do mv -- "$file" "toml/$file.toml";done
        ./dasel validate toml/*.toml toml/labeled_configs/*.toml
      shell: bash
