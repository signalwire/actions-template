name: GitOps values bump

# Reusable workflow: bumps an image tag in a Helm values file, either committing
# directly to a branch (e.g. auto-deploy to dev) or opening a review PR (e.g.
# gated production release). ArgoCD (or equivalent) picks up the change on sync.
#
# Split into mode-specific jobs (rather than one job with both branches) so
# each only requests the permissions it actually needs: a caller running
# direct-commit mode shouldn't have to grant pull-requests: write just because
# the pull-request-mode code path also lives in this workflow.

on:
  workflow_call:
    inputs:
      VALUES_FILE:
        required: true
        type: string
        description: 'Path to the values YAML file to update.'
      YQ_PATH:
        required: true
        type: string
        description: 'yq path to the tag field, e.g. .platformImage.tag'
      IMAGE_TAG:
        required: true
        type: string
      MODE:
        required: true
        type: string
        description: 'direct-commit or pull-request'
      TARGET_BRANCH:
        required: true
        type: string
        description: 'Branch to commit to (direct-commit) or PR base branch (pull-request).'
      PR_BRANCH_PREFIX:
        required: false
        type: string
        default: 'release/'
      PR_TITLE:
        required: false
        type: string
        default: ''
        description: 'Defaults to "Release <IMAGE_TAG> to <TARGET_BRANCH>" if empty.'
      PR_BODY:
        required: false
        type: string
        default: ''
        description: 'Defaults to a standard review checklist if empty.'
      COMMIT_MESSAGE:
        required: false
        type: string
        default: ''
        description: 'Defaults to "chore: update image tag to <IMAGE_TAG> [skip ci]" if empty.'
      APP_ID:
        required: false
        type: string
        default: ''
        description: 'GitHub App ID used to mint a PR-creation token for MODE: pull-request. Unused (and optional) in direct-commit mode.'
    secrets:
      APP_PRIVATE_KEY:
        required: false
        description: 'Private key for APP_ID. Required when MODE is pull-request — the reusable GITHUB_TOKEN often cannot open PRs (org policy), so pull-request mode always authenticates as this App instead.'

jobs:
  validate:
    name: Validate mode
    runs-on: ubuntu-latest
    steps:
      - run: |
          case "${{ inputs.MODE }}" in
            direct-commit|pull-request) ;;
            *)
              echo "::error::MODE must be direct-commit or pull-request, got '${{ inputs.MODE }}'."
              exit 1
              ;;
          esac
      - if: ${{ inputs.MODE == 'pull-request' && inputs.APP_ID == '' }}
        run: |
          echo "::error::APP_ID is required when MODE is pull-request."
          exit 1

  direct-commit:
    name: Bump ${{ inputs.YQ_PATH }} -> ${{ inputs.IMAGE_TAG }} (direct commit)
    needs: [validate]
    if: ${{ inputs.MODE == 'direct-commit' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.TARGET_BRANCH }}

      - name: Bump value
        env:
          VALUES_FILE: ${{ inputs.VALUES_FILE }}
          YQ_PATH: ${{ inputs.YQ_PATH }}
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
        run: |
          yq -i "${YQ_PATH} = strenv(IMAGE_TAG)" "${VALUES_FILE}"

      - name: Commit directly to target branch
        env:
          VALUES_FILE: ${{ inputs.VALUES_FILE }}
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
          TARGET_BRANCH: ${{ inputs.TARGET_BRANCH }}
          COMMIT_MESSAGE: ${{ inputs.COMMIT_MESSAGE }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "${VALUES_FILE}"
          git diff --cached --quiet && exit 0
          MSG="${COMMIT_MESSAGE:-chore: update image tag to ${IMAGE_TAG} [skip ci]}"
          git commit -m "${MSG}"
          git pull --rebase origin "${TARGET_BRANCH}"
          git push origin "${TARGET_BRANCH}"

  pull-request:
    name: Bump ${{ inputs.YQ_PATH }} -> ${{ inputs.IMAGE_TAG }} (PR)
    needs: [validate]
    if: ${{ inputs.MODE == 'pull-request' }}
    runs-on: ubuntu-latest
    # No GITHUB_TOKEN permissions requested — all git/gh operations below
    # authenticate as the App token minted in this same job instead, so
    # this job's validity doesn't depend on the org's GITHUB_TOKEN PR
    # policy. The token must be minted here rather than in a separate job:
    # actions/create-github-app-token masks its output as a secret, and
    # GitHub silently empties masked values when forwarded through a job's
    # `outputs:` to another job (see "Skip output 'token' since it may
    # contain secret" in the run log) — it only survives within the job
    # that generated it.
    permissions: {}
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.TARGET_BRANCH }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Bump value
        env:
          VALUES_FILE: ${{ inputs.VALUES_FILE }}
          YQ_PATH: ${{ inputs.YQ_PATH }}
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
        run: |
          yq -i "${YQ_PATH} = strenv(IMAGE_TAG)" "${VALUES_FILE}"

      - name: Open review PR
        env:
          VALUES_FILE: ${{ inputs.VALUES_FILE }}
          IMAGE_TAG: ${{ inputs.IMAGE_TAG }}
          TARGET_BRANCH: ${{ inputs.TARGET_BRANCH }}
          PR_BRANCH: ${{ inputs.PR_BRANCH_PREFIX }}${{ inputs.IMAGE_TAG }}
          PR_TITLE: ${{ inputs.PR_TITLE }}
          PR_BODY: ${{ inputs.PR_BODY }}
          COMMIT_MESSAGE: ${{ inputs.COMMIT_MESSAGE }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "${PR_BRANCH}"
          git add "${VALUES_FILE}"
          MSG="${COMMIT_MESSAGE:-chore: release ${IMAGE_TAG} [skip ci]}"
          git commit -m "${MSG}"
          git push origin "${PR_BRANCH}"

          TITLE="${PR_TITLE:-Release ${IMAGE_TAG} to ${TARGET_BRANCH}}"
          if [ -n "${PR_BODY}" ]; then
            printf '%s\n' "${PR_BODY}" > /tmp/pr-body.md
          else
            printf '%s\n' \
              "Automated GitOps PR — updates \`${VALUES_FILE}\` to image tag \`${IMAGE_TAG}\`." \
              "" \
              "**Review checklist:**" \
              "- [ ] Staging smoke tests passed" \
              "- [ ] No outstanding incidents" \
              "" \
              "Merging this PR will update the target Application on the next sync." \
              > /tmp/pr-body.md
          fi

          gh pr create \
            --title "${TITLE}" \
            --body-file /tmp/pr-body.md \
            --base "${TARGET_BRANCH}" \
            --head "${PR_BRANCH}"
