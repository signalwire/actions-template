# This is a basic workflow to help you get started with Actions

name: CI checking

# Controls when the workflow will run
on:

  workflow_call:
    inputs:
      PROJECT_NAME:
        required: true
        type: string
      LANGUAGE:
        required: true
        type: string
      NODE_VERSION:
        required: false
        default: "19"
        type: string
      COVERAGE:
        required: false
        type: boolean
        default: true
      RUBY_VERSION:
        required: false
        type: string
        description: Default Ruby version
      PYTHON_VERSION:
        required: false
        type: string
        description: Default Python version
      GO_VERSION:
        required: false
        type: string
        description: 'Go version to use. Defaults to the version in go.mod if not set.'
      RUN_LINT:
        required: false
        type: boolean
        default: true
        description: 'Whether to run golangci-lint (Go).'
      RUN_VULNCHECK:
        required: false
        type: boolean
        default: true
        description: 'Whether to run govulncheck (Go).'
      RUN_GOSEC:
        required: false
        type: boolean
        default: false
        description: 'Whether to run gosec (Go security static analysis) as a parallel gating job.'
      RUN_SEMGREP:
        required: false
        type: boolean
        default: false
        description: 'Whether to run Semgrep SAST as a parallel gating job.'
      RUN_TRUFFLEHOG:
        required: false
        type: boolean
        default: false
        description: 'Whether to run TruffleHog secret scanning as a parallel gating job.'
      RUN_GRYPE:
        required: false
        type: boolean
        default: false
        description: 'Whether to run a Grype dependency vulnerability scan as a parallel gating job.'
      RUN_TRIVY_FS:
        required: false
        type: boolean
        default: false
        description: 'Whether to run a Trivy filesystem (dependency + IaC) scan as a parallel gating job.'
      TEST_DEPENDENCIES:
        required: false
        type: boolean
        default: false
      TEST_DEPENDENCIES_PRIVATE:
        required: false
        type: boolean
        default: false
      DEPENDENCIES_FILE:
        required: false
        type: string
        default: ./provisioning/docker-compose.yml
      DOTNET_VERSION:
        required: false
        type: string
        default: "6.0.403"
      SUBMODULES_RECURSIVE:
        required: false
        type: boolean
        default: false
      RUNNER:
        type: string
        default: 'ubuntu-latest'
        description: 'The default runner.'
      ENVIRONMENT: 
        type: string
        description: 'The environment related to an WF execution'
      ENV_PATH: 
        type: string
        description: 'The .env file for CI.'
      TEST_CREATE_NETWORK: 
        type: boolean
        description: 'Whenever you want to create a docker network for test dependencies.'
      RUBY_RAKE_COMMANDS:
        type: string
        description: A comma-separated list of rake commands.
      ADDITIONAL_SETUP:
        type: string
        default: '[]'
        description: 'JSON array of additional setup commands'
      ZEITWERK:
        type: boolean
        description: Zeitwerk run.
        default: true
      BRAKEMAN:
        type: boolean
        default: true
        description: Brakeman run.
      RUBOCOP:
        type: boolean
        description: Rubocop run.
        default: true
      RUN_TESTS:
        type: boolean
        description: Whenever you wanna run tests.
        default: true
      DOTNET_INSTALL_DIR:
        type: string
        required: false
        default: '/usr/share/dotnet'
        description: Set a custom .NET install dir
      DOTNET_TEST_ARGS:
        type: string
        required: false
        default: ''
        description: Extra arguments appended to the dotnet test command.
      ## Vault Secrets
      VAULT_SECRETS:
        type: string
        default: ''
        description: 'A comma separated list of secrets to fetch from Vault.'
        required: false
      TELEPORT_APP:
        type: string
        default: ''
        description: 'The Teleport app to use.'
        required: false
      TELEPORT_PROXY_URL:
        type: string
        default: ''
        description: 'The Teleport proxy URL to use.'
        required: false
    secrets:
      SONAR_HOST_URL:
        required: false
      SONAR_TOKEN: 
        required: false
      SONAR_PROJECT_KEY:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      GH_BOT_DEPLOY_KEY:
        required: false
      CONTRIBSYS_CREDENTIALS:
        required: false
        description: Contribsys credentials used for ruby gems
      # Vault Secrets
      VAULT_TOKEN:
        required: false
        description: 'Vault token.'
      TELEPORT_TOKEN:
        required: false
        description: 'Teleport token.'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  ci:
    # The type of runner that the job will run on
    runs-on: ${{ inputs.RUNNER }}
    name: CI_CHECK
    environment: ${{ inputs.ENVIRONMENT }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Update git
      if: ${{ inputs.SUBMODULES_RECURSIVE  == true }}
      run: |
        sudo apt update
        sudo apt install -y git

    - uses: actions/checkout@v4
      if: ${{ inputs.SUBMODULES_RECURSIVE  == true }}
      name: Checkout submodules
      with:
        ssh-key: ${{ secrets.GH_BOT_DEPLOY_KEY }}
        submodules: 'recursive'

    - name: Checkout actions
      uses: actions/checkout@v4
      with:
        repository: signalwire/actions-template
        ref: main
        path: actions

    - name: Retrieve Secrets from HashiCorp Vault
      uses: ./actions/.github/actions/vault-secrets
      if: ${{ inputs.VAULT_SECRETS != '' }}
      env:
        VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        VAULT_ADDR: https://${{ inputs.TELEPORT_PROXY_URL }}
        TELEPORT_TOKEN: ${{ secrets.TELEPORT_TOKEN }}
        TELEPORT_APP: ${{ inputs.TELEPORT_APP }}
        TELEPORT_PROXY_URL: ${{ inputs.TELEPORT_PROXY_URL }}
        SECRETS: ${{ inputs.VAULT_SECRETS }}
        
    - name: Up Test dependencies
      if: ${{ inputs.TEST_DEPENDENCIES == true}}
      uses: ./actions/.github/actions/docker-compose
      with:
        COMPOSE_FILE: ${{ inputs.DEPENDENCIES_FILE }}
        DOCKERHUB_LOGIN: ${{ inputs.TEST_DEPENDENCIES_PRIVATE }}
        RUN_BACKGROUND: true
        CREATE_NETWORK: ${{ inputs.TEST_CREATE_NETWORK }}
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Test .NET
      if: ${{ inputs.LANGUAGE == 'dot-net' }}
      uses: ./actions/.github/actions/test-dotnet
      with:
        DOTNET_VERSION: ${{ inputs.DOTNET_VERSION }}
        DOTNET_INSTALL_DIR: ${{ inputs.DOTNET_INSTALL_DIR }}
        RUN_TESTS: ${{ inputs.RUN_TESTS }}
        DOTNET_TEST_ARGS: ${{ inputs.DOTNET_TEST_ARGS }}

    - name: Test JS
      if: ${{ inputs.LANGUAGE == 'JavaScript' }}
      uses: ./actions/.github/actions/test-javascript
      with:
        NODE_VERSION: ${{ inputs.NODE_VERSION }}
    
    - name: Test Ruby
      if: ${{ inputs.LANGUAGE == 'Ruby' }}
      uses: ./actions/.github/actions/test-ruby
      with:
        RUBY_VERSION: ${{ inputs.RUBY_VERSION }}
        ENV_PATH: ${{ inputs.ENV_PATH }}
        RUBY_RAKE_COMMANDS: ${{ inputs.RUBY_RAKE_COMMANDS }}
        ADDITIONAL_SETUP: ${{ inputs.ADDITIONAL_SETUP }}
        ZEITWERK: ${{ inputs.ZEITWERK }}
        BRAKEMAN: ${{ inputs.BRAKEMAN }}
        RUBOCOP: ${{ inputs.RUBOCOP }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Test Python
      if: ${{ inputs.LANGUAGE == 'Python' }}
      uses: ./actions/.github/actions/test-python
      with:
        PYTHON_VERSION: ${{ inputs.PYTHON_VERSION }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Test Go
      if: ${{ inputs.LANGUAGE == 'Go' }}
      uses: ./actions/.github/actions/test-go
      with:
        GO_VERSION: ${{ inputs.GO_VERSION }}
        RUN_TESTS: ${{ inputs.RUN_TESTS }}
        RUN_LINT: ${{ inputs.RUN_LINT }}
        RUN_VULNCHECK: ${{ inputs.RUN_VULNCHECK }}

    - name: Test configs
      if: inputs.LANGUAGE == 'configs' || inputs.LANGUAGE == 'configs'
      uses: ./actions/.github/actions/test-configs
    
    - name: SonarQube Coverage
      if: ${{ inputs.COVERAGE == true }}
      uses: ./actions/.github/actions/sonarqube
      with:
        LANGUAGE: ${{ inputs.LANGUAGE }}
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN : ${{ secrets.GITHUB_TOKEN }}
        SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}

  # ──────────────────────────────────────────────────────────────────
  # Optional security-scan jobs, gated by RUN_* inputs (default off, so
  # existing callers are unaffected). Run in parallel with `ci` rather than
  # as steps inside it, since they're independent gates, not part of the
  # build/test/lint sequence.
  # ──────────────────────────────────────────────────────────────────
  security-gosec:
    name: gosec
    if: ${{ inputs.RUN_GOSEC == true }}
    runs-on: ${{ inputs.RUNNER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Checkout actions
        uses: actions/checkout@v4
        with:
          repository: signalwire/actions-template
          ref: main
          path: actions

      - uses: ./actions/.github/actions/gosec-scan

  security-semgrep:
    name: Semgrep SAST
    if: ${{ inputs.RUN_SEMGREP == true }}
    runs-on: ${{ inputs.RUNNER }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout actions
        uses: actions/checkout@v4
        with:
          repository: signalwire/actions-template
          ref: main
          path: actions

      - uses: ./actions/.github/actions/semgrep-scan

  security-trufflehog:
    name: TruffleHog secret scanning
    if: ${{ inputs.RUN_TRUFFLEHOG == true }}
    runs-on: ${{ inputs.RUNNER }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout actions
        uses: actions/checkout@v4
        with:
          repository: signalwire/actions-template
          ref: main
          path: actions

      - uses: ./actions/.github/actions/trufflehog-scan

  security-grype:
    name: Grype dependency scan
    if: ${{ inputs.RUN_GRYPE == true }}
    runs-on: ${{ inputs.RUNNER }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout actions
        uses: actions/checkout@v4
        with:
          repository: signalwire/actions-template
          ref: main
          path: actions

      - uses: ./actions/.github/actions/grype-scan

  security-trivy-fs:
    name: Trivy filesystem scan
    if: ${{ inputs.RUN_TRIVY_FS == true }}
    runs-on: ${{ inputs.RUNNER }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Checkout actions
        uses: actions/checkout@v4
        with:
          repository: signalwire/actions-template
          ref: main
          path: actions

      - uses: ./actions/.github/actions/trivy-fs-scan
