name: Release

# Caller for the reusable release-please.yml workflow. Runs on every push to
# main; release-please opens/updates a release PR from Conventional Commits
# and, once merged, tags the release.

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    uses: ./.github/workflows/release-please.yml
    with:
      RELEASE_TYPE: simple
      APP_ID: ${{ vars.RELEASE_PLEASE_APP_ID }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
